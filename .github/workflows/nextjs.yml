try {
const r1 = await window.storage.get(STORAGE_KEY);
if (r1) { const p = JSON.parse(r1.value); setData(p); setNote(p[today]?.note || “”); prevStreakRef.current = getStreak(p, 0); }
const r2 = await window.storage.get(META_KEY);
if (r2) setMeta(JSON.parse(r2.value));
} catch { setData({}); }
setLoaded(true);
}
load();
}, []);

async function save(newData) {
setData(newData);
const newStreak = getStreak(newData, meta.graceDays);
if (STREAK_MILESTONES.includes(newStreak) && newStreak > prevStreakRef.current) setCelebration(newStreak);
prevStreakRef.current = newStreak;
try { await window.storage.set(STORAGE_KEY, JSON.stringify(newData)); } catch (e) { console.error(e); }
}

async function saveMeta(newMeta) {
setMeta(newMeta);
try { await window.storage.set(META_KEY, JSON.stringify(newMeta)); } catch (e) { console.error(e); }
}

function toggleCheck(id) {
save({ …data, [activeDate]: { …data[activeDate], checks: { …(data[activeDate]?.checks || {}), [id]: !data[activeDate]?.checks?.[id] }, note: data[activeDate]?.note || “” } });
}

function saveNote() {
save({ …data, [activeDate]: { …data[activeDate], checks: data[activeDate]?.checks || {}, note } });
}

function manualResetStreak() {
const newMeta = { …meta, streakResets: […(meta.streakResets || []), { date: today, streakAt: streak }] };
saveMeta(newMeta);
// Clear all data from today backwards until the streak breaks naturally by wiping checks
const newData = { …data };
const keys = Object.keys(newData).sort().reverse();
for (const key of keys) {
newData[key] = { …newData[key], checks: {} };
}
save(newData);
setShowResetConfirm(false);
}

