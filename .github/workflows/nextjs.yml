<div style={{ position: “fixed”, inset: 0, background: “rgba(0,0,0,0.93)”, zIndex: 999, display: “flex”, flexDirection: “column”, alignItems: “center”, justifyContent: “center”, animation: “fadeIn 0.4s ease” }}>
